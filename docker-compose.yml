services:
  backend:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      RIMAS_DB_HOST: db
      RIMAS_DB_PORT: "5432"
      RIMAS_DB_NAME: ${RIMAS_DB_NAME:-rimas}
      RIMAS_DB_USER: ${RIMAS_DB_USER:-rimas}
      RIMAS_DB_PASSWORD: ${RIMAS_DB_PASSWORD:-rimas_password}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RIMAS_NEO4J_URI: bolt://neo4j:7687
      RIMAS_NEO4J_USER: ${RIMAS_NEO4J_USER:-neo4j}
      RIMAS_NEO4J_PASSWORD: ${RIMAS_NEO4J_PASSWORD:-rimas_neo4j_password}
      RIMAS_ELASTICSEARCH_URL: http://elasticsearch:9200
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - .:/workspace

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: "http://127.0.0.1:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${RIMAS_DB_NAME:-rimas}
      POSTGRES_USER: ${RIMAS_DB_USER:-rimas}
      POSTGRES_PASSWORD: ${RIMAS_DB_PASSWORD:-rimas_password}
    ports:
      - "${RIMAS_DB_HOST_PORT:-5432}:5432"
    volumes:
      - rimas_postgres_data:/var/lib/postgresql/data
      - .:/workspace:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./db/init/03-load-source-data.sh:/docker-entrypoint-initdb.d/03-load-source-data.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${RIMAS_NEO4J_USER:-neo4j}/${RIMAS_NEO4J_PASSWORD:-rimas_neo4j_password}
    ports:
      - "${NEO4J_BROWSER_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - rimas_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      logger.org.elasticsearch.plugins: WARN
      logger.org.elasticsearch.env: WARN
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - rimas_elasticsearch_data:/usr/share/elasticsearch/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  rimas_postgres_data:
  rimas_neo4j_data:
  rimas_elasticsearch_data:
